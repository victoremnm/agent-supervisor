name: Supervisor Loop

on:
  schedule:
    # Every hour at :00 — adjust timing as needed
    # Note: GitHub Actions cron has ~1 min jitter; minimum schedule is every 5 min
    - cron: "0 * * * *"
  workflow_dispatch:
    # Manual trigger with optional repo override
    inputs:
      target_repos:
        description: "Comma-separated repos to process (overrides TARGET_REPOS secret)"
        required: false
        type: string
  # Reusable workflow — consuming repos call:
  #   uses: victoremnm/agent-supervisor/.github/workflows/supervisor-cron.yml@main
  #   secrets: inherit
  workflow_call:
    inputs:
      target_repos:
        description: "Comma-separated repos to process"
        required: false
        type: string
    secrets:
      GEMINI_API_KEY:
        required: true
      GH_APP_ID:
        required: false
      GH_APP_PRIVATE_KEY:
        required: false
      GH_APP_INSTALLATION_ID:
        required: false
      GH_APP_INSTALLATION_IDS:
        required: false
        # Format: "owner:id,owner2:id2" e.g. "victoremnm:113367631,BonkBotTeam:987654"
        # Overrides GH_APP_INSTALLATION_ID for multi-org deployments
      TARGET_REPOS:
        required: false
      LANGFUSE_SECRET_KEY:
        required: false
      LANGFUSE_PUBLIC_KEY:
        required: false
      LANGFUSE_HOST:
        required: false

# Minimal permissions — only what the daemon needs
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  supervisor:
    name: Run supervisor loop
    runs-on: ubuntu-latest
    timeout-minutes: 25  # Hard cap: prevent runaway agent loops from billing excess

    steps:
      - name: Checkout agent-supervisor
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ] || [ -z "${{ secrets.TARGET_REPOS }}" ]; then
            echo "::warning::GEMINI_API_KEY or TARGET_REPOS not configured — skipping run. See GITHUB_APP_SETUP.md."
            echo "SKIP_RUN=true" >> $GITHUB_ENV
          fi

      - name: Run supervisor daemon
        if: env.SKIP_RUN != 'true'
        env:
          # Gemini (primary model)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          # GitHub App identity — note: secrets use GH_APP_* prefix (GITHUB_ is reserved by Actions)
          GITHUB_APP_ID: ${{ secrets.GH_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          # Multi-org: "owner:id,owner2:id2" — takes precedence over singular ID
          GITHUB_APP_INSTALLATION_IDS: ${{ secrets.GH_APP_INSTALLATION_IDS }}
          # Single-org fallback (used if owner not found in IDS map)
          GITHUB_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}

          # Target repositories — use workflow_dispatch input if provided, else secret
          TARGET_REPOS: ${{ inputs.target_repos || secrets.TARGET_REPOS }}

          # Langfuse observability
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}


        run: npx tsx src/supervisor/daemon.ts

      - name: Upload run summary (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: supervisor-run-${{ github.run_id }}
          path: |
            /tmp/supervisor-*.json
          retention-days: 7
